services:
  api:
    build:
      context: ./docker/
      dockerfile: dev.Dockerfile
    restart: on-failure
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - ${PORT}:${PORT}
    depends_on:
      - postgres
    networks:
      - lems-ya-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - ${DATABASE_PORT:-5432}:5432
    volumes:
      - lems-ya-db:/var/lib/postgresql/data
    networks:
      - lems-ya-network

networks:
  lems-ya-network:
    driver: bridge

volumes:
  lems-ya-db:
    driver: local