name: Deploy to Production

on:
  push:
    branches: [main]

env:
  HEALTH_CHECK_URL: https://api.my-web-dev.website/api/health

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -coverprofile=coverage.out

      # ❌ Disabled because using SonarCloud Automatic Analysis (free plan)
      # - name: SonarCloud
      #   uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 15

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          sync: true
          timeout: 60s
          command_timeout: 15m
          script: |
            cd ~/apps/LEMS-Backend
            echo "Commit: ${{ github.sha }}"
            bash deploy.sh

      - name: Health Check
        run: |
          for i in {1..5}; do
            if curl -sf "https://api.my-web-dev.website/health"; then
              echo "Deploy successful"
              exit 0
            fi
            echo "Retry $i..."
            sleep 5
          done
          echo "Health check failed"
          exit 1